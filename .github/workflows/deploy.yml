name: Build, Push, and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write
  id-token: write

env:
  APP_IMAGE_NAME: ghcr.io/${{ github.repository }}/app
  MIGRATIONS_IMAGE_NAME: ghcr.io/${{ github.repository }}/migrations
  DOKPLOY_API_TOKEN: ${{ secrets.DOKPLOY_API_TOKEN }}
  DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
  TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
  TS_AUDIENCE: ${{ secrets.TS_AUDIENCE }}

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract app image metadata
        id: app-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.APP_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Extract migrations image metadata
        id: migrations-meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.MIGRATIONS_IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push app image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.app
          push: true
          tags: ${{ steps.app-meta.outputs.tags }}
          labels: ${{ steps.app-meta.outputs.labels }}
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

      - name: Build and push migrations image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.migrations
          push: true
          tags: ${{ steps.migrations-meta.outputs.tags }}
          labels: ${{ steps.migrations-meta.outputs.labels }}
          cache-from: type=gha,scope=migrations
          cache-to: type=gha,mode=max,scope=migrations

      - name: Connect to Tailscale
        if: env.DOKPLOY_API_TOKEN != '' && env.DOKPLOY_COMPOSE_ID != '' && env.TS_OAUTH_CLIENT_ID != ''
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
          audience: ${{ env.TS_AUDIENCE }}
          tags: tag:ci
          ping: dokbox

      - name: Trigger Dokploy redeploy
        if: env.DOKPLOY_API_TOKEN != '' && env.DOKPLOY_COMPOSE_ID != '' && env.TS_OAUTH_CLIENT_ID != ''
        run: |
          curl -fsS -X POST "http://dokbox:3000/api/compose.deploy" \
            -H "accept: application/json" \
            -H "Content-Type: application/json" \
            -H "x-api-key: ${DOKPLOY_API_TOKEN}" \
            -d "{\"composeId\": \"${DOKPLOY_COMPOSE_ID}\"}"

      - name: Deployment configuration notice
        if: env.DOKPLOY_API_TOKEN == '' || env.DOKPLOY_COMPOSE_ID == '' || env.TS_OAUTH_CLIENT_ID == ''
        run: echo "Images were published; Dokploy deployment was skipped because deployment secrets are not configured."
